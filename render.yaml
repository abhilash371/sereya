services:
  - type: web
    name: sereya-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NODE_ENV
        value: production

  - type: static
    name: sereya-frontend
    staticPublishPath: ./frontend
    buildCommand: echo "Frontend ready"
    envVars: []
